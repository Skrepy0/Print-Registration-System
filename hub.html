<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印刷登记快速录入系统 · 费用分类版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#165DFF',
              secondary: '#36CFC9',
              accent: '#722ED1',
              neutral: '#86909C',
              light: '#F2F3F5',
              dark: '#1D2129',
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.5s ease-out',
              'pulse-slow': 'pulse 3s infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              fadeInUp: {
                '0%': {opacity: '0', transform: 'translateY(10px)'},
                '100%': {opacity: '1', transform: 'translateY(0)'},
              },
              float: {
                '0%, 100%': {transform: 'translateY(0)'},
                '50%': {transform: 'translateY(-5px)'},
              }
            }
          }
        }
      }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .card-shadow { box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06); }
            .transition-custom { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
            .input-focus { @apply focus:ring-4 focus:ring-primary/20 focus:border-primary focus:outline-none; }
            .hover-lift:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); }
            .btn-scale:active { transform: scale(0.97); }
            .ripple-effect { position: relative; overflow: hidden; }
            .ripple-effect::after { content: ''; position: absolute; top: 50%; left: 50%; width: 5px; height: 5px; background: rgba(255, 255, 255, 0.5); opacity: 0; border-radius: 100%; transform: translate(-50%, -50%) scale(1); transition: all 0.5s ease-out; }
            .ripple-effect:active::after { width: 300px; height: 300px; opacity: 0.3; transition: 0s; }
        }
        body { background: linear-gradient(145deg, #f9fafb 0%, #f1f5f9 100%); min-height: 100vh; }
        tbody tr { transition: background-color 0.2s ease, box-shadow 0.2s ease; }
        tbody tr:hover { background-color: #f8fafc !important; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .modal-backdrop { backdrop-filter: blur(4px); background-color: rgba(0, 0, 0, 0.3); }
        .inner-glow { box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.8); }
        .info-link {
            position: relative;
            text-decoration: none;
            color: #007bff;
        }
        .info-link::after {
            content: attr(data-info);  /* 从 data-info 获取文本 */
            position: absolute;
            bottom: 150%;              /* 显示在链接上方 */
            left: -30px;
            background: #333;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s;
            pointer-events: none;       /* 避免遮挡鼠标事件 */
            z-index: 10;
        }
        .info-link:hover::after {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body class="font-sans text-dark antialiased">

<!-- 顶部导航栏 -->
<header class="bg-white/90 backdrop-blur-md shadow-lg sticky top-0 z-50 transition-custom border-b border-white/20">
    <div class="container mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center">
        <div class="flex items-center mb-2 md:mb-0 group">
            <i class="fa fa-print text-primary text-3xl mr-3 transition-transform group-hover:rotate-6 group-hover:scale-110 duration-300"></i>
            <h1 class="text-xl md:text-2xl font-bold bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent animate-pulse-slow">
                印刷登记快速录入系统</h1>
        </div>

        <div class="flex items-center space-x-1 md:space-x-4 w-full md:w-auto justify-between">
            <div class="flex items-center text-sm text-neutral mr-2 bg-light/60 px-3 py-1.5 rounded-full">
                    <span id="sync-status" class="flex items-center">
                        <i class="fa fa-check-circle text-green-500 mr-1 animate-pulse"></i>
                        <span>数据已同步</span>
                    </span>
            </div>

            <div class="flex space-x-2 w-full md:w-auto">
                <button id="import-btn"
                        class="flex-1 md:flex-none px-3 py-1.5 bg-accent hover:bg-accent/90 text-white text-sm rounded-lg transition-all duration-200 flex items-center justify-center shadow-md hover:shadow-xl hover:-translate-y-0.5 active:translate-y-0 btn-scale ripple-effect">
                    <i class="fa fa-upload mr-1"></i> 导入备份
                </button>
                <button id="backup-btn"
                        class="flex-1 md:flex-none px-3 py-1.5 bg-white hover:bg-gray-100 text-sm rounded-lg transition-all duration-200 flex items-center justify-center border border-gray-200 shadow-sm hover:shadow-md hover:-translate-y-0.5 active:translate-y-0 btn-scale">
                    <i class="fa fa-database mr-1 text-primary"></i> 备份数据
                </button>
                <button id="export-all-btn"
                        class="flex-1 md:flex-none px-3 py-1.5 bg-primary hover:bg-primary/90 text-white text-sm rounded-lg transition-all duration-200 flex items-center justify-center shadow-md hover:shadow-xl hover:-translate-y-0.5 active:translate-y-0 btn-scale ripple-effect">
                    <i class="fa fa-download mr-1"></i> 导出全部
                </button>
                <input type="file" id="file-upload" accept=".json" class="hidden"/>
            </div>
        </div>
    </div>
</header>

<!-- 主内容区 (恢复费用分类区块，删除了单价/金额) -->
<main class="container mx-auto px-4 py-6 animate-fade-in-up">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- 左侧：数据录入表单 -->
        <div class="lg:col-span-1">
            <div class="bg-white/90 backdrop-blur-sm rounded-2xl card-shadow p-5 transition-all duration-300 hover:shadow-2xl hover:-translate-y-1 border border-white/50 inner-glow">
                <h2 class="text-lg font-semibold mb-4 pb-2 border-b border-gray-100 flex items-center">
                    <i class="fa fa-pencil-square-o text-primary mr-2 animate-pulse-slow"></i>印刷信息录入
                </h2>

                <form id="print-form" class="space-y-4">
                    <!-- 基本信息 (不变) -->
                    <div class="space-y-3">
                        <h3 class="text-sm font-medium text-neutral/80 uppercase tracking-wider">基本信息</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div>
                                <label for="date" class="block text-sm font-medium mb-1">日期 <span class="text-red-500">*</span></label>
                                <input type="date" id="date" required class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                            </div>
                            <div>
                                <label for="grade" class="block text-sm font-medium mb-1">年级</label>
                                <select id="grade" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                                    <option value="">请选择</option>
                                    <option value="高一">高一</option>
                                    <option value="高二">高二</option>
                                    <option value="高三">高三</option>
                                    <option value="其他">其他</option>
                                </select>
                                <div id="grade-other-container" class="mt-2 hidden">
                                    <label for="grade-other" class="block text-sm font-medium mb-1 text-gray-600">其他年级：</label>
                                    <input type="text" id="grade-other" placeholder="输入年级..." class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div>
                                <label for="subject" class="block text-sm font-medium mb-1">学科 <span class="text-red-500">*</span></label>
                                <select id="subject" required class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                                    <option value="">请选择学科</option>
                                    <option value="语文">语文</option>
                                    <option value="数学">数学</option>
                                    <option value="英语">英语</option>
                                    <option value="物理">物理</option>
                                    <option value="化学">化学</option>
                                    <option value="生物">生物</option>
                                    <option value="地理">地理</option>
                                    <option value="政治">政治</option>
                                    <option value="历史">历史</option>
                                    <option value="其他">其他</option>
                                </select>
                                <div id="subject-other-container" class="mt-2 hidden">
                                    <label for="subject-other" class="block text-sm font-medium mb-1 text-gray-600">自定义学科</label>
                                    <input type="text" id="subject-other" placeholder="输入学科名称..." class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom">
                                </div>
                            </div>
                            <div>
                                <label for="submitter" class="block text-sm font-medium mb-1">送印人 <span class="text-red-500">*</span></label>
                                <select id="submitter" required class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                                    <option value="">请选择送印人</option>
                                    <option value="李寒光">李寒光</option>
                                    <option value="姬传涛">姬传涛</option>
                                    <option value="杨阳">杨阳</option>
                                    <option value="沈文文">沈文文</option>
                                    <option value="王莹莹">王莹莹</option>
                                    <option value="沈新启">沈新启</option>
                                    <option value="蒋丰慧">蒋丰慧</option>
                                    <option value="刘峰涛">刘峰涛</option>
                                    <option value="耿庆雷">耿庆雷</option>
                                    <option value="梁从丽">梁从丽</option>
                                    <option value="李翔冲">李翔冲</option>
                                    <option value="黄曼曼">黄曼曼</option>
                                    <option value="朱一凡">朱一凡</option>
                                    <option value="李星">李星</option>
                                    <option value="周文辉">周文辉</option>
                                    <option value="赵永芳">赵永芳</option>
                                    <option value="刁洪涛">刁洪涛</option>
                                    <option value="闫威">闫威</option>
                                    <option value="其他">其他</option>
                                </select>
                                <div id="submitter-other-container" class="mt-2 hidden">
                                    <label for="submitter-other" class="block text-sm font-medium mb-1 text-gray-600">送印人</label>
                                    <input type="text" id="submitter-other" placeholder="送印人..." class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 印刷信息 (不变) -->
                    <div class="space-y-3">
                        <h3 class="text-sm font-medium text-neutral/80 uppercase tracking-wider">印刷信息</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div>
                                <label for="paper-size" class="block text-sm font-medium mb-1">纸张规格</label>
                                <select id="paper-size" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                                    <option value="A3" selected>A3</option>
                                    <option value="A4">A4</option>
                                    <option value="A5">A5</option>
                                    <option value="B4">B4</option>
                                    <option value="B5">B5</option>
                                    <option value="其他">其他</option>
                                </select>
                                <div id="paper-size-other-container" class="mt-2 hidden">
                                    <label for="paper-size-other" class="block text-sm font-medium mb-1 text-gray-600">自定义规格</label>
                                    <input type="text" id="paper-size-other" placeholder="例如：8开" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom">
                                </div>
                            </div>
                            <div>
                                <label for="print-type" class="block text-sm font-medium mb-1">单双 <span class="text-red-500">*</span></label>
                                <select id="print-type" required class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                                    <option value="单面">单面</option>
                                    <option value="双面" selected>双面</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div>
                                <label for="paper-count" class="block text-sm font-medium mb-1">印刷纸张 <span class="text-red-500">*</span></label>
                                <input type="number" id="paper-count" required min="1" value="1" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                            </div>
                            <div>
                                <label for="copy-count" class="block text-sm font-medium mb-1">印刷份数 <span class="text-red-500">*</span></label>
                                <input type="number" id="copy-count" required min="1" value="50" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                            </div>
                        </div>

                        <div>
                            <label for="plate-count" class="block text-sm font-medium mb-1">制版数量</label>
                            <input type="number" id="plate-count" min="0" value="0" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                        </div>
                    </div>

                    <!-- ========= 费用分类区块（恢复，不含单价/金额） ========= -->
                    <div class="space-y-3">
                        <h3 class="text-sm font-medium text-neutral/80 uppercase tracking-wider">📁 费用分类</h3>

                        <!-- 印刷总数 (只读) -->
                        <div>
                            <label for="total-pages" class="block text-sm font-medium mb-1">印刷总数</label>
                            <input type="number" id="total-pages" readonly class="w-full px-3 py-2 bg-gray-100/50 border border-gray-200 rounded-xl text-gray-600">
                        </div>

                        <!-- 类型 (下拉+其他) -->
                        <div>
                            <label for="expense-type" class="block text-sm font-medium mb-1">类型</label>
                            <select id="expense-type" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                                <option value="教学资料">教学资料</option>
                                <option value="试卷" selected>试卷</option>
                                <option value="答题卡">答题卡</option>
                                <option value="办公文件">办公文件</option>
                                <option value="其他">其他</option>
                            </select>
                            <div id="expense-type-other-container" class="mt-2 hidden">
                                <label for="expense-type-other" class="block text-sm font-medium mb-1 text-gray-600">自定义类型</label>
                                <input type="text" id="expense-type-other" placeholder="输入费用类型..." class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom">
                            </div>
                        </div>

                        <!-- 负责人 (从之前单独位置移回) -->
                        <div>
                            <label for="responsible-person" class="block text-sm font-medium mb-1">负责人</label>
                            <input type="text" id="responsible-person" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                        </div>
                    </div>

                    <!-- 备注信息 (不变) -->
                    <div>
                        <label for="notes" class="block text-sm font-medium mb-1">备注</label>
                        <textarea id="notes" rows="3" placeholder="请输入备注信息..." class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white resize-none"></textarea>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="flex space-x-3 pt-2">
                        <button type="reset" id="reset-btn" class="flex-1 px-4 py-2 border border-gray-300 rounded-xl hover:bg-gray-100 transition-all duration-200 text-neutral flex items-center justify-center btn-scale bg-white/80">
                            <i class="fa fa-refresh mr-1"></i> 重置
                        </button>
                        <button type="submit" id="save-btn" class="flex-1 px-4 py-2 bg-primary text-white rounded-xl hover:bg-primary/90 transition-all duration-200 flex items-center justify-center shadow-md hover:shadow-xl btn-scale ripple-effect">
                            <i class="fa fa-save mr-1"></i> 保存记录
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 右侧：数据列表 (无金额列，与之前精简版一致) -->
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white/90 backdrop-blur-sm rounded-2xl card-shadow p-5 transition-all duration-300 hover:shadow-2xl border border-white/50 inner-glow">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 pb-2 border-b border-gray-100">
                    <h2 class="text-lg font-semibold mb-2 md:mb-0 flex items-center">
                        <i class="fa fa-list-alt text-primary mr-2 animate-pulse-slow"></i>印刷记录列表
                    </h2>
                    <div class="w-full md:w-auto flex space-x-2">
                        <div class="relative flex-1 md:flex-none md:w-64">
                            <input type="text" id="search-input" placeholder="搜索记录..." class="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                            <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-neutral/60"></i>
                        </div>
                        <button id="export-selected-btn" class="px-3 py-2 bg-secondary hover:bg-secondary/90 text-white rounded-xl transition-all duration-200 flex items-center shadow-md hover:shadow-lg btn-scale ripple-effect">
                            <i class="fa fa-file-excel-o mr-1"></i> 导出选中
                        </button>
                    </div>
                </div>

                <!-- 数据表格 (列数已减少) -->
                <div class="overflow-x-auto rounded-xl border border-gray-100">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gradient-to-r from-primary/5 to-secondary/5">
                        <tr>
                            <th class="px-3 py-3 text-left text-xs font-medium text-neutral uppercase tracking-wider w-10">
                                <input type="checkbox" id="select-all" class="rounded border-gray-300 text-primary focus:ring-primary/30">
                            </th>
                            <th class="sortable px-3 py-3 text-left text-xs font-medium text-neutral uppercase tracking-wider cursor-pointer hover:text-primary transition-colors" data-sort="date">日期 <i class="fa fa-sort ml-1"></i></th>
                            <th class="sortable px-3 py-3 text-left text-xs font-medium text-neutral uppercase tracking-wider cursor-pointer hover:text-primary transition-colors" data-sort="grade">年级 <i class="fa fa-sort ml-1"></i></th>
                            <th class="sortable px-3 py-3 text-left text-xs font-medium text-neutral uppercase tracking-wider cursor-pointer hover:text-primary transition-colors" data-sort="subject">学科 <i class="fa fa-sort ml-1"></i></th>
                            <th class="sortable px-3 py-3 text-left text-xs font-medium text-neutral uppercase tracking-wider cursor-pointer hover:text-primary transition-colors" data-sort="submitter">送印人 <i class="fa fa-sort ml-1"></i></th>
                            <th class="sortable px-3 py-3 text-left text-xs font-medium text-neutral uppercase tracking-wider cursor-pointer hover:text-primary transition-colors" data-sort="printType">单双 <i class="fa fa-sort ml-1"></i></th>
                            <th class="sortable px-3 py-3 text-left text-xs font-medium text-neutral uppercase tracking-wider cursor-pointer hover:text-primary transition-colors" data-sort="totalPages">印刷总数 <i class="fa fa-sort ml-1"></i></th>
                            <th class="px-3 py-3 text-left text-xs font-medium text-neutral uppercase tracking-wider">操作</th>
                        </tr>
                        </thead>
                        <tbody id="records-table-body" class="bg-white divide-y divide-gray-100">
                        <!-- 动态插入 -->
                        </tbody>
                    </table>
                </div>

                <!-- 分页控制 -->
                <div class="flex flex-col sm:flex-row justify-between items-center mt-4 pt-3 border-t border-gray-100">
                    <div class="text-sm text-neutral/70 mb-3 sm:mb-0">显示 <span id="start-record">0</span>-<span id="end-record">0</span> 条，共 <span id="total-records">0</span> 条</div>
                    <div class="flex items-center space-x-1">
                        <select id="page-size" class="px-2 py-1 border border-gray-200 rounded-lg text-sm input-focus bg-white/80">
                            <option value="10">10条/页</option>
                            <option value="20">20条/页</option>
                            <option value="50">50条/页</option>
                            <option value="100">100条/页</option>
                        </select>
                        <div class="flex items-center space-x-1">
                            <button id="prev-page" class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-neutral hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed transition-all hover:shadow btn-scale" disabled><i class="fa fa-chevron-left text-xs"></i></button>
                            <span id="current-page" class="mx-2 text-sm font-medium">第 1 页</span>
                            <button id="next-page" class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-neutral hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed transition-all hover:shadow btn-scale" disabled><i class="fa fa-chevron-right text-xs"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 数据统计图表 (仅印刷总数) -->
            <div class="bg-white/90 backdrop-blur-sm rounded-2xl card-shadow p-5 transition-all duration-300 hover:shadow-2xl border border-white/50 inner-glow">
                <h2 class="text-lg font-semibold mb-4 pb-2 border-b border-gray-100 flex items-center">
                    <i class="fa fa-bar-chart text-primary mr-2 animate-pulse-slow"></i>近7日印刷总数趋势
                </h2>
                <div class="h-64 p-2 bg-gradient-to-br from-primary/5 to-secondary/5 rounded-xl">
                    <canvas id="statistics-chart"></canvas>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- 页脚 (不变) -->
<footer class="bg-white/70 backdrop-blur-sm border-t border-gray-200/70 mt-8">
    <div class="container mx-auto px-4 py-4 text-center text-sm text-neutral/70">
        <p>&#169; 2026 印刷登记快速录入系统 | 商丘市人民印刷有限公司</p>
        <br>
        <p>由Skrepy二次修改，点击 <a href="https://www.52pojie.cn/thread-2076303-1-1.html" style="color:#6edbd9">此处</a>查看原项目</p>
    </div>
</footer>

<!-- 提示框 -->
<div id="toast" class="fixed bottom-5 right-5 px-4 py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-500 ease-elastic flex items-center z-50 backdrop-blur-md bg-white/90 border border-white/20">
    <i id="toast-icon" class="mr-2 text-lg"></i>
    <span id="toast-message" class="font-medium"></span>
</div>

<!-- 编辑模态框 (内部费用分类区块已同步修改，无单价/金额) -->
<div id="edit-modal" class="fixed inset-0 flex items-center justify-center z-50 hidden modal-backdrop transition-all duration-300">
    <div class="bg-white/95 backdrop-blur-md rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto m-4 transition-all duration-500 scale-95 opacity-0 shadow-2xl border border-white/50" id="modal-content">
        <div class="p-5 border-b border-gray-100 flex justify-between items-center sticky top-0 bg-white/80 backdrop-blur-sm z-10 rounded-t-2xl">
            <h3 class="text-lg font-semibold bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent">编辑印刷记录</h3>
            <button id="close-modal" class="text-neutral hover:text-dark transition-all hover:rotate-90 duration-300 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100">
                <i class="fa fa-times text-xl"></i>
            </button>
        </div>
        <div class="p-5">
            <form id="edit-form" class="space-y-4">
                <!-- 动态生成，由JS填充 -->
            </form>
        </div>
    </div>
</div>

<script>
  (function() {
    // 从localStorage加载，并清理遗留的unitPrice/totalAmount字段
    let rawRecords = JSON.parse(localStorage.getItem('printingRecords')) || [];
    let records = rawRecords.map(({ unitPrice, totalAmount, ...rest }) => rest); // 彻底丢弃旧字段

    let currentPage = 1;
    let pageSize = 10;
    let sortField = null;
    let sortDirection = 'asc';
    let searchTerm = '';
    let chart = null;

    // DOM 元素
    const printForm = document.getElementById('print-form');
    const recordsTableBody = document.getElementById('records-table-body');
    const totalRecordsElement = document.getElementById('total-records');
    const startRecordElement = document.getElementById('start-record');
    const endRecordElement = document.getElementById('end-record');
    const currentPageElement = document.getElementById('current-page');
    const prevPageButton = document.getElementById('prev-page');
    const nextPageButton = document.getElementById('next-page');
    const pageSizeSelect = document.getElementById('page-size');
    const searchInput = document.getElementById('search-input');
    const selectAllCheckbox = document.getElementById('select-all');
    const exportSelectedButton = document.getElementById('export-selected-btn');
    const exportAllButton = document.getElementById('export-all-btn');
    const backupButton = document.getElementById('backup-btn');
    const editModal = document.getElementById('edit-modal');
    const modalContent = document.getElementById('modal-content');
    const closeModalButton = document.getElementById('close-modal');
    const editForm = document.getElementById('edit-form');
    const importButton = document.getElementById('import-btn');
    const fileUploadInput = document.getElementById('file-upload');

    // 计算字段 (印刷总数)
    const paperCountInput = document.getElementById('paper-count');
    const copyCountInput = document.getElementById('copy-count');
    const printTypeSelect = document.getElementById('print-type');
    const totalPagesInput = document.getElementById('total-pages');  // 只读，位于费用分类区块

    // 下拉框"其他"相关 (包含恢复的费用分类字段)
    const paperSizeSelect = document.getElementById('paper-size');
    const paperSizeOtherContainer = document.getElementById('paper-size-other-container');
    const paperSizeOtherInput = document.getElementById('paper-size-other');
    const gradeSelect = document.getElementById('grade');
    const gradeOtherContainer = document.getElementById('grade-other-container');
    const gradeOtherInput = document.getElementById('grade-other');
    // 费用分类相关 (已恢复)
    const expenseTypeSelect = document.getElementById('expense-type');
    const expenseTypeOtherContainer = document.getElementById('expense-type-other-container');
    const expenseTypeOtherInput = document.getElementById('expense-type-other');
    const subjectSelect = document.getElementById('subject');
    const subjectOtherContainer = document.getElementById('subject-other-container');
    const subjectOtherInput = document.getElementById('subject-other');
    const submitterSelect = document.getElementById('submitter');
    const submitterOtherContainer = document.getElementById('submitter-other-container');
    const submitterOtherInput = document.getElementById('submitter-other');
    const responsiblePersonInput = document.getElementById('responsible-person'); // 已移入费用分类

    // 预设值列表
    const GRADE_OPTIONS = ['高一', '高二', '高三'];
    const PAPER_SIZE_OPTIONS = ['A3', 'A4', 'A5', 'B4', 'B5'];
    const SUBJECT_OPTIONS = ['语文', '数学', '英语', '物理', '化学', '生物', '地理', '政治', '历史'];
    const SUBMITTER_OPTIONS = ["李寒光","姬传涛","杨阳","沈文文","王莹莹","沈新启","蒋丰慧",
      "刘峰涛","耿庆雷","梁从丽","李翔冲","黄曼曼","朱一凡","李星","周文辉","赵永芳","刁洪涛","闫威"]
    const EXPENSE_TYPE_OPTIONS = ['教学资料', '试卷', '答题卡', '办公文件'];

    // 初始化日期为今天
    document.getElementById('date').valueAsDate = new Date();

    // ========== 工具函数 ==========
    function getFilteredRecords() {
      if (!searchTerm) return records.slice();
      const term = searchTerm.toLowerCase();
      return records.filter(r =>
        r.date.toLowerCase().includes(term) ||
        (r.grade || '').toLowerCase().includes(term) ||
        r.subject.toLowerCase().includes(term) ||
        r.submitter.toLowerCase().includes(term) ||
        r.paperSize.toLowerCase().includes(term)
      );
    }

    function getFinalValue(sel, other) {
      if (sel.value === '其他') return other.value.trim() || '其他';
      return sel.value || '';
    }

    // 计算印刷总数 (纸张*份数*单双系数)
    function calculateTotalPages() {
      const paperCount = parseInt(paperCountInput.value) || 0;
      const copyCount = parseInt(copyCountInput.value) || 0;
      totalPagesInput.value = paperCount * copyCount;
    }

    // 保存至localStorage并清理旧字段
    function saveRecords() {
      const cleanRecords = records.map(({ unitPrice, totalAmount, ...keep }) => keep);
      records = cleanRecords;
      localStorage.setItem('printingRecords', JSON.stringify(records));
      updateSyncStatus(true);
    }

    function updateSyncStatus(s) {
      document.getElementById('sync-status').innerHTML = s ? '<i class="fa fa-check-circle text-green-500 mr-1 animate-pulse"></i><span>数据已同步</span>' : '<i class="fa fa-exclamation-triangle text-yellow-500 mr-1"></i><span>数据未同步</span>';
    }

    // ========== 初始化事件 ==========
    function init() {
      calculateTotalPages();

      paperCountInput.addEventListener('input', calculateTotalPages);
      copyCountInput.addEventListener('input', calculateTotalPages);
      printTypeSelect.addEventListener('change', calculateTotalPages);

      paperSizeSelect.addEventListener('change', togglePaperSizeOther);
      gradeSelect.addEventListener('change', toggleGradeOther);
      subjectSelect.addEventListener('change', toggleSubjectOther);
      submitterSelect.addEventListener('change', toggleSubmitterOther)
      expenseTypeSelect.addEventListener('change', toggleExpenseTypeOther);

      printForm.addEventListener('reset', function () {
        setTimeout(() => {
          paperSizeOtherInput.value = '';
          gradeOtherInput.value = '';
          subjectOtherInput.value = '';
          submitterOtherContainer.value = '';
          expenseTypeOtherInput.value = '';
          togglePaperSizeOther();
          toggleGradeOther();
          toggleSubjectOther();
          toggleExpenseTypeOther();
          calculateTotalPages();
        }, 10);
      });

      printForm.addEventListener('submit', handleFormSubmit);

      prevPageButton.addEventListener('click', goToPrevPage);
      nextPageButton.addEventListener('click', goToNextPage);
      pageSizeSelect.addEventListener('change', handlePageSizeChange);
      searchInput.addEventListener('input', handleSearch);
      selectAllCheckbox.addEventListener('change', handleSelectAll);
      exportSelectedButton.addEventListener('click', exportSelectedRecords);
      exportAllButton.addEventListener('click', exportAllRecords);
      backupButton.addEventListener('click', backupData);

      document.querySelectorAll('.sortable').forEach(header => {
        header.addEventListener('click', () => handleSort(header.dataset.sort));
      });

      closeModalButton.addEventListener('click', closeModal);
      editModal.addEventListener('click', (e) => {
        if (e.target === editModal) closeModal();
      });

      importButton.addEventListener('click', () => fileUploadInput.click());
      fileUploadInput.addEventListener('change', handleFileUpload);

      renderRecords();
      initChart();
    }

    // ========== 其他字段切换 ==========
    function togglePaperSizeOther() {
      paperSizeSelect.value === '其他' ? paperSizeOtherContainer.classList.remove('hidden') : (paperSizeOtherContainer.classList.add('hidden'), paperSizeOtherInput.value = '');
    }
    function toggleGradeOther() {
      gradeSelect.value === '其他' ? gradeOtherContainer.classList.remove('hidden') : (gradeOtherContainer.classList.add('hidden'), gradeOtherInput.value = '');
    }
    function toggleSubjectOther() {
      subjectSelect.value === '其他' ? subjectOtherContainer.classList.remove('hidden') : (subjectOtherContainer.classList.add('hidden'), subjectOtherInput.value = '');
    }
    function toggleSubmitterOther() {
      submitterSelect.value === '其他' ? submitterOtherContainer.classList.remove('hidden') : (submitterOtherContainer.classList.add('hidden'), submitterOtherInput.value = '');
    }
    function toggleExpenseTypeOther() {
      expenseTypeSelect.value === '其他' ? expenseTypeOtherContainer.classList.remove('hidden') : (expenseTypeOtherContainer.classList.add('hidden'), expenseTypeOtherInput.value = '');
    }

    // ========== 表单提交 (无单价/金额) ==========
    function handleFormSubmit(e) {
      e.preventDefault();
      const grade = getFinalValue(gradeSelect, gradeOtherInput);
      const subject = getFinalValue(subjectSelect, subjectOtherInput);
      const submitter = getFinalValue(submitterSelect, submitterOtherInput);
      const paperSize = getFinalValue(paperSizeSelect, paperSizeOtherInput);
      const expenseType = getFinalValue(expenseTypeSelect, expenseTypeOtherInput);
      if (!grade || grade==='请选择年级') return showToast('请选择年级','warning');
      if (!subject) return showToast('请选择或输入学科', 'warning');
      if (!submitter || submitter === '其他') return showToast('请输入有效的送印人', 'warning');

      const newRecord = {
        id: Date.now().toString(),
        date: document.getElementById('date').value,
        grade, subject, paperSize, expenseType, submitter,
        printType: printTypeSelect.value,
        paperCount: parseInt(paperCountInput.value) || 0,
        copyCount: parseInt(copyCountInput.value) || 0,
        plateCount: parseInt(document.getElementById('plate-count').value) || 0,
        totalPages: parseInt(totalPagesInput.value) || 0,
        responsiblePerson: responsiblePersonInput.value.trim(),
        notes: document.getElementById('notes').value.trim(),
        createdAt: new Date().toISOString()
      };
      records.unshift(newRecord);
      saveRecords();
      renderRecords();
      updateChart();
      printForm.reset();
      document.getElementById('date').valueAsDate = new Date();
      calculateTotalPages();
      showToast('记录保存成功', 'success');
    }

    // ========== 渲染表格 (无金额列) ==========
    function renderRecords() {
      const filtered = getFilteredRecords();
      if (sortField) {
        filtered.sort((a, b) => {
          let va = a[sortField];
          let vb = b[sortField];
          if (va == null || va === '') va = sortDirection === 'asc' ? '\uffff' : '';
          if (vb == null || vb === '') vb = sortDirection === 'asc' ? '\uffff' : '';
          if (sortField === 'totalPages') {
            va = parseInt(va) || 0;
            vb = parseInt(vb) || 0;
            return sortDirection === 'asc' ? va - vb : vb - va;
          }
          const strA = String(va).toLowerCase();
          const strB = String(vb).toLowerCase();
          if (strA < strB) return sortDirection === 'asc' ? -1 : 1;
          if (strA > strB) return sortDirection === 'asc' ? 1 : -1;
          return 0;
        });
      }

      const total = Math.ceil(filtered.length / pageSize);
      currentPage = Math.min(currentPage, total || 1);
      const start = (currentPage - 1) * pageSize;
      const end = Math.min(start + pageSize, filtered.length);
      const curr = filtered.slice(start, end);

      totalRecordsElement.textContent = filtered.length;
      startRecordElement.textContent = filtered.length ? start + 1 : 0;
      endRecordElement.textContent = end;
      currentPageElement.textContent = `第 ${currentPage} 页`;
      prevPageButton.disabled = currentPage === 1;
      nextPageButton.disabled = currentPage >= total;

      recordsTableBody.innerHTML = '';
      if (!curr.length) {
        recordsTableBody.innerHTML = '<tr><td colspan="8" class="px-3 py-8 text-center text-neutral/60"><i class="fa fa-inbox mr-2"></i>暂无记录</td></tr>';
        return;
      }

      curr.forEach(r => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50/80 transition-colors';
        tr.innerHTML = `
          <td class="px-3 py-3"><input type="checkbox" class="record-select rounded border-gray-300 text-primary focus:ring-primary/30" data-id="${r.id}"></td>
          <td class="px-3 py-3">${r.date}</td>
          <td class="px-3 py-3">${r.grade || '-'}</td>
          <td class="px-3 py-3">${r.subject}</td>
          <td class="px-3 py-3">${r.submitter}</td>
          <td class="px-3 py-3">${r.printType}</td>
          <td class="px-3 py-3">${r.totalPages}</td>
          <td class="px-3 py-3">
            <button class="edit-btn text-blue-500 p-1 hover:text-blue-700 transition-transform hover:scale-110"><i class="fa info-link" data-info="修改记录">📝</i></button>
            <button class="delete-btn text-red-500 p-1 hover:text-red-700 transition-transform hover:scale-110"><i class="fa info-link" data-info="删除记录">🔥</i></button>
          </td>
        `;
        recordsTableBody.appendChild(tr);
        tr.querySelector('.edit-btn').addEventListener('click', () => editRecord(r.id));
        tr.querySelector('.delete-btn').addEventListener('click', () => deleteRecord(r.id));
        const cb = tr.querySelector('.record-select');
        cb.addEventListener('change', updateSelectAllStatus);
      });
      updateSelectAllStatus();
    }

    // ========== 分页、搜索、排序 ==========
    function goToPrevPage() { if (currentPage > 1) { currentPage--; renderRecords(); } }
    function goToNextPage() { const t = Math.ceil(getFilteredRecords().length / pageSize); if (currentPage < t) { currentPage++; renderRecords(); } }
    function handlePageSizeChange() { pageSize = +pageSizeSelect.value; currentPage = 1; renderRecords(); }
    function handleSearch() { searchTerm = searchInput.value.trim(); currentPage = 1; renderRecords(); }
    function handleSort(f) {
      if (sortField === f) sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
      else { sortField = f; sortDirection = 'asc'; }
      document.querySelectorAll('.sortable i').forEach(i => i.className = 'fa fa-sort ml-1');
      const ic = document.querySelector(`.sortable[data-sort="${f}"] i`);
      if (ic) ic.className = `fa fa-sort-${sortDirection} ml-1`;
      renderRecords();
    }

    // ========== 全选 ==========
    function handleSelectAll() { document.querySelectorAll('.record-select').forEach(cb => cb.checked = selectAllCheckbox.checked); }
    function updateSelectAllStatus() { const cs = document.querySelectorAll('.record-select'); selectAllCheckbox.checked = cs.length && Array.from(cs).every(c => c.checked); }

    // ========== 导出 (无金额字段) ==========
    function exportSelectedRecords() {
      const ids = Array.from(document.querySelectorAll('.record-select:checked')).map(c => c.dataset.id);
      if (!ids.length) return showToast('请选择记录', 'warning');
      exportRecordsToExcel(records.filter(r => ids.includes(r.id)), '印刷记录_选中');
    }
    function exportAllRecords() { exportRecordsToExcel(records, '印刷记录_全部'); }
    function exportRecordsToExcel(data, name) {
      const out = data.map(r => ({
        日期: r.date, 年级: r.grade || '', 学科: r.subject, 送印人: r.submitter, 纸张: r.paperSize,
        单双: r.printType, 纸张数: r.paperCount, 份数: r.copyCount, 印刷总数: r.totalPages,
        类型: r.expenseType, 负责人: r.responsiblePerson || '', 备注: r.notes || ''
      }));
      const ws = XLSX.utils.json_to_sheet(out);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '印刷记录');
      XLSX.writeFile(wb, `${name}_${new Date().toLocaleDateString().replace(/\//g, '-')}.xlsx`);
      showToast('导出成功', 'success');
    }

    // ========== 备份 ==========
    function backupData() {
      if (!records.length) return showToast('无数据可备份', 'warning');
      const cleanForBackup = records.map(({ unitPrice, totalAmount, ...keep }) => keep);
      const blob = new Blob([JSON.stringify({records: cleanForBackup, time: new Date()})], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `备份_${new Date().toLocaleDateString().replace(/\//g, '-')}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('备份成功', 'success');
    }

    // ========== 导入 ==========
    function handleFileUpload(e) {
      const file = e.target.files[0];
      if (!file || (file.type !== 'application/json' && !file.name.endsWith('.json'))) {
        showToast('请选择JSON文件', 'error'); fileUploadInput.value = ''; return;
      }
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.records || !Array.isArray(data.records)) throw new Error('无效备份');
          const cleanedIncoming = data.records.map(({ unitPrice, totalAmount, ...rest }) => rest);
          const isValid = cleanedIncoming.every(r => r.id && r.date && r.subject && r.submitter);
          if (!isValid) { showToast('备份文件中存在不完整的记录', 'error'); fileUploadInput.value = ''; return; }

          const mode = confirm(`备份中有 ${cleanedIncoming.length} 条记录。\n确定=覆盖现有，取消=合并`);
          if (mode) {
            records = cleanedIncoming;
          } else {
            const existingIds = new Set(records.map(r => r.id));
            const newRecords = cleanedIncoming.filter(r => !existingIds.has(r.id));
            const updatedRecords = cleanedIncoming.filter(r => existingIds.has(r.id));
            updatedRecords.forEach(backupRecord => {
              const index = records.findIndex(r => r.id === backupRecord.id);
              if (index !== -1) records[index] = backupRecord;
            });
            records = [...newRecords, ...records];
          }
          saveRecords();
          renderRecords();
          updateChart();
          showToast('导入成功', 'success');
        } catch (err) { showToast('解析失败', 'error'); }
        fileUploadInput.value = '';
      };
      reader.readAsText(file);
    }

    // ========== 删除 ==========
    function deleteRecord(id) {
      if (confirm('确定删除？')) {
        records = records.filter(r => r.id !== id);
        saveRecords();
        renderRecords();
        updateChart();
        showToast('已删除', 'success');
      }
    }

    // ========== 模态框 ==========
    function openModal() { editModal.classList.remove('hidden'); void modalContent.offsetWidth; modalContent.classList.remove('scale-95', 'opacity-0'); modalContent.classList.add('scale-100', 'opacity-100'); }
    function closeModal() { modalContent.classList.remove('scale-100', 'opacity-100'); modalContent.classList.add('scale-95', 'opacity-0'); setTimeout(() => { editModal.classList.add('hidden'); editForm.innerHTML = ''; }, 300); }

    // ========== 提示 ==========
    function showToast(msg, type = 'info') {
      const toast = document.getElementById('toast');
      const icon = document.getElementById('toast-icon');
      const msgEl = document.getElementById('toast-message');
      const colors = {success: 'green', warning: 'yellow', error: 'red', info: 'blue'};
      const icons = { success: 'fa-check-circle', warning: 'fa-exclamation-triangle', error: 'fa-times-circle', info: 'fa-info-circle' };
      toast.className = `fixed bottom-5 right-5 px-4 py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] flex items-center z-50 backdrop-blur-md bg-white/90 border border-${colors[type]}-200`;
      icon.className = `fa ${icons[type]} mr-2 text-${colors[type]}-600`;
      msgEl.textContent = msg;
      setTimeout(() => { toast.classList.remove('translate-y-20', 'opacity-0'); toast.classList.add('translate-y-0', 'opacity-100'); }, 10);
      setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
    }

    // ========== 图表 (仅印刷总数) ==========
    function initChart() {
      const ctx = document.getElementById('statistics-chart').getContext('2d');
      const data = getChartData();
      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.labels,
          datasets: [
            { label: '印刷总数', data: data.totalPages, backgroundColor: 'rgba(22,93,255,0.7)', borderRadius: 6 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: { y: { beginAtZero: true, grid: { color: '#eef2f6' } } },
          plugins: { legend: { labels: { usePointStyle: true, boxWidth: 8 } } }
        }
      });
    }
    function updateChart() { if (!chart) return; const d = getChartData(); chart.data.labels = d.labels; chart.data.datasets[0].data = d.totalPages; chart.update(); }
    function getChartData() {
      const labels = [], pages = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        const key = d.toISOString().split('T')[0];
        labels.push(`${d.getMonth() + 1}月${d.getDate()}日`);
        const day = records.filter(r => r.date === key);
        pages.push(day.reduce((s, r) => s + r.totalPages, 0));
      }
      return { labels, totalPages: pages };
    }

    // ========== 编辑记录 (恢复费用分类区块，无单价/金额) ==========
    function editRecord(id) {
      const record = records.find(r => r.id === id);
      if (!record) { showToast('记录不存在', 'error'); return; }

      const isCustomGrade = !GRADE_OPTIONS.includes(record.grade);
      const isCustomSubject = !SUBJECT_OPTIONS.includes(record.subject);
      const isCustomSubmitter = !SUBMITTER_OPTIONS.includes(record.submitter);
      const isCustomPaperSize = !PAPER_SIZE_OPTIONS.includes(record.paperSize);
      const isCustomExpenseType = !EXPENSE_TYPE_OPTIONS.includes(record.expenseType);

      editForm.innerHTML = `
        <input type="hidden" id="edit-id" value="${record.id}">

        <!-- 基本信息 (不变) -->
        <div class="space-y-3">
            <h3 class="text-sm font-medium text-neutral/80 uppercase tracking-wider">基本信息</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div><label class="block text-sm font-medium mb-1">日期 <span class="text-red-500">*</span></label><input type="date" id="edit-date" required value="${record.date}" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white"></div>
                <div><label class="block text-sm font-medium mb-1">年级</label>
                    <select id="edit-grade" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                        ${GRADE_OPTIONS.map(g => `<option value="${g}" ${record.grade === g ? 'selected' : ''}>${g}</option>`).join('')}
                        <option value="其他" ${isCustomGrade ? 'selected' : ''}>其他</option>
                    </select>
                    <div id="edit-grade-other-box" class="mt-2 ${isCustomGrade ? '' : 'hidden'}"><label class="block text-sm font-medium mb-1 text-gray-600">其他年级：</label><input type="text" id="edit-grade-other" value="${isCustomGrade ? record.grade : ''}" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom"></div>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div><label class="block text-sm font-medium mb-1">学科 <span class="text-red-500">*</span></label>
                    <select id="edit-subject" required class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                        <option value="">请选择</option>${SUBJECT_OPTIONS.map(s => `<option value="${s}" ${record.subject === s ? 'selected' : ''}>${s}</option>`).join('')}<option value="其他" ${isCustomSubject ? 'selected' : ''}>其他</option>
                    </select>
                    <div id="edit-subject-other-box" class="mt-2 ${isCustomSubject ? '' : 'hidden'}"><label class="block text-sm font-medium mb-1 text-gray-600">自定义学科：</label><input type="text" id="edit-subject-other" value="${isCustomSubject ? record.subject : ''}" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom"></div>
                </div>
                <div><label class="block text-sm font-medium mb-1">送印人 <span class="text-red-500">*</span></label>
                    <select id="edit-submitter" required class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                        <option value="">请选择</option>${SUBMITTER_OPTIONS.map(s => `<option value="${s}" ${record.subject === s ? 'selected' : ''}>${s}</option>`).join('')}<option value="其他" ${isCustomSubmitter ? 'selected' : ''}>其他</option>
                    </select>
                    <div id="edit-submitter-other-box" class="mt-2 ${isCustomSubmitter ? '' : 'hidden'}"><label class="block text-sm font-medium mb-1 text-gray-600">其他送印人：</label><input type="text" id="edit-submitter-other" value="${isCustomSubmitter ? record.submitter : ''}" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom"></div>
            </div>
        </div>

        <!-- 印刷信息 (不变) -->
        <div class="space-y-3">
            <h3 class="text-sm font-medium text-neutral/80 uppercase tracking-wider">印刷信息</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div><label class="block text-sm font-medium mb-1">纸张规格</label>
                    <select id="edit-paper-size" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                        ${PAPER_SIZE_OPTIONS.map(p => `<option value="${p}" ${record.paperSize === p ? 'selected' : ''}>${p}</option>`).join('')}<option value="其他" ${isCustomPaperSize ? 'selected' : ''}>其他</option>
                    </select>
                    <div id="edit-paper-other-box" class="mt-2 ${isCustomPaperSize ? '' : 'hidden'}"><label class="block text-sm font-medium mb-1 text-gray-600">自定义规格：</label><input type="text" id="edit-paper-other" value="${isCustomPaperSize ? record.paperSize : ''}" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom"></div>
                </div>
                <div><label class="block text-sm font-medium mb-1">单双 <span class="text-red-500">*</span></label><select id="edit-print-type" required class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white"><option value="单面" ${record.printType === '单面' ? 'selected' : ''}>单面</option><option value="双面" ${record.printType === '双面' ? 'selected' : ''}>双面</option></select></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div><label class="block text-sm font-medium mb-1">印刷纸张 <span class="text-red-500">*</span></label><input type="number" id="edit-paper-count" required min="1" value="${record.paperCount}" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white"></div>
                <div><label class="block text-sm font-medium mb-1">印刷份数 <span class="text-red-500">*</span></label><input type="number" id="edit-copy-count" required min="1" value="${record.copyCount}" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white"></div>
            </div>
            <div><label class="block text-sm font-medium mb-1">制版数量</label><input type="number" id="edit-plate-count" min="0" value="${record.plateCount}" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white"></div>
        </div>

        <!-- ===== 费用分类区块（恢复，无单价/金额） ===== -->
        <div class="space-y-3">
            <h3 class="text-sm font-medium text-neutral/80 uppercase tracking-wider">📁 费用分类</h3>
            <div>
                <label class="block text-sm font-medium mb-1">印刷总数</label>
                <input type="number" id="edit-total-pages" readonly value="${record.totalPages}" class="w-full px-3 py-2 bg-gray-100/50 border border-gray-200 rounded-xl text-gray-600">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">类型</label>
                <select id="edit-expense-type" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
                    ${EXPENSE_TYPE_OPTIONS.map(e => `<option value="${e}" ${record.expenseType === e ? 'selected' : ''}>${e}</option>`).join('')}<option value="其他" ${isCustomExpenseType ? 'selected' : ''}>其他</option>
                </select>
                <div id="edit-expense-other-box" class="mt-2 ${isCustomExpenseType ? '' : 'hidden'}"><label class="block text-sm font-medium mb-1 text-gray-600">自定义类型：</label><input type="text" id="edit-expense-other" value="${isCustomExpenseType ? record.expenseType : ''}" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom"></div>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">负责人</label>
                <input type="text" id="edit-responsible" value="${record.responsiblePerson || ''}" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white">
            </div>
        </div>

        <!-- 备注 -->
        <div>
            <label class="block text-sm font-medium mb-1">备注</label>
            <textarea id="edit-notes" rows="3" class="w-full px-3 py-2 border border-gray-200 rounded-xl input-focus transition-custom bg-gray-50/50 focus:bg-white resize-none">${record.notes || ''}</textarea>
        </div>

        <!-- 操作按钮 -->
        <div class="flex space-x-3 pt-2">
            <button type="button" id="cancel-edit" class="flex-1 px-4 py-2 border border-gray-300 rounded-xl hover:bg-gray-100 transition-all duration-200 text-neutral flex items-center justify-center btn-scale bg-white/80"><i class="fa fa-times mr-1"></i> 取消</button>
            <button type="submit" class="flex-1 px-4 py-2 bg-primary text-white rounded-xl hover:bg-primary/90 transition-all duration-200 flex items-center justify-center shadow-md hover:shadow-xl btn-scale ripple-effect"><i class="fa fa-save mr-1"></i> 保存修改</button>
        </div>
      `;

      // 绑定事件和计算逻辑 (仅总数)
      const editPaperCount = document.getElementById('edit-paper-count');
      const editCopyCount = document.getElementById('edit-copy-count');
      const editPrintType = document.getElementById('edit-print-type');
      const editTotalPages = document.getElementById('edit-total-pages');
      function calcEditTotal() {
        const pc = parseInt(editPaperCount.value) || 0;
        const cc = parseInt(editCopyCount.value) || 0;
        editTotalPages.value = pc * cc;
      }
      editPaperCount.addEventListener('input', calcEditTotal);
      editCopyCount.addEventListener('input', calcEditTotal);
      editPrintType.addEventListener('change', calcEditTotal);

      // 其他字段切换
      document.getElementById('edit-grade').addEventListener('change', function(){ document.getElementById('edit-grade-other-box').classList.toggle('hidden', this.value !== '其他'); });
      document.getElementById('edit-subject').addEventListener('change', function(){ document.getElementById('edit-subject-other-box').classList.toggle('hidden', this.value !== '其他'); });
      document.getElementById('edit-submitter').addEventListener('change', function () {document.getElementById('edit-submitter-other-box').classList.toggle('hidden', this.value !== '其他');})
      document.getElementById('edit-paper-size').addEventListener('change', function(){ document.getElementById('edit-paper-other-box').classList.toggle('hidden', this.value !== '其他'); });
      document.getElementById('edit-expense-type').addEventListener('change', function(){ document.getElementById('edit-expense-other-box').classList.toggle('hidden', this.value !== '其他'); });

      document.getElementById('cancel-edit').addEventListener('click', closeModal);

      const handleEditSubmit = (e) => {
        e.preventDefault();
        const finalGrade = getFinalValue(document.getElementById('edit-grade'), document.getElementById('edit-grade-other'));
        const finalSubject = getFinalValue(document.getElementById('edit-subject'), document.getElementById('edit-subject-other'));
        const finalSubmitter = getFinalValue(document.getElementById('edit-submitter'), document.getElementById('edit-submitter-other'));
        const finalPaperSize = getFinalValue(document.getElementById('edit-paper-size'), document.getElementById('edit-paper-other'));
        const finalExpenseType = getFinalValue(document.getElementById('edit-expense-type'), document.getElementById('edit-expense-other'));
        if (!document.getElementById('edit-date').value) return showToast('请选择日期', 'warning');
        if (!finalGrade) return showToast('请选择年级','warning');
        if (!finalSubject) return showToast('请选择或输入学科', 'warning');
        if (!finalSubmitter) return showToast('请输入送印人', 'warning');

        const index = records.findIndex(r => r.id === id);
        if (index === -1) { showToast('记录不存在', 'error'); return; }

        records[index] = {
          ...records[index],
          date: document.getElementById('edit-date').value,
          grade: finalGrade,
          subject: finalSubject,
          submitter: finalSubmitter,
          paperSize: finalPaperSize,
          printType: editPrintType.value,
          paperCount: parseInt(editPaperCount.value) || 0,
          copyCount: parseInt(editCopyCount.value) || 0,
          plateCount: parseInt(document.getElementById('edit-plate-count').value) || 0,
          totalPages: parseInt(editTotalPages.value) || 0,
          expenseType: finalExpenseType,
          responsiblePerson: document.getElementById('edit-responsible').value.trim(),
          notes: document.getElementById('edit-notes').value.trim()
        };
        saveRecords();
        renderRecords();
        updateChart();
        closeModal();
        showToast('记录修改成功', 'success');
      };
      editForm.removeEventListener('submit', handleEditSubmit);
      editForm.addEventListener('submit', handleEditSubmit);
      openModal();
    }

    // 启动
    init();
  })();
</script>
</body>
</html>
